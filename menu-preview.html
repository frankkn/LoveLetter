<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>情書 Love Letter — Menu Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:ital,wght@0,400;0,600;1,400&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ──────────────────────────────────────────────
   Design Tokens
   ────────────────────────────────────────────── */
:root {
    --gold-hi:     #fff3c0;
    --gold-bright: #f5d07a;
    --gold-mid:    #c9a227;
    --gold-dark:   #7d5e12;
    --text-ivory:  #f0e6cc;
    --text-muted:  #c4a882;
    --panel-bg:    rgba(7, 3, 16, 0.82);
    --panel-r:     6px;
    --shimmer:     rgba(255, 235, 140, 0.22);
}

/* ──────────────────────────────────────────────
   Reset
   ────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    overflow: hidden;
}

body {
    font-family: 'Noto Serif TC', 'Georgia', serif;
    background: #090610;
    color: var(--text-ivory);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    isolation: isolate;
}

/* ──────────────────────────────────────────────
   Background atmosphere layers
   ────────────────────────────────────────────── */
.bg-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -2;
}

/* Warm crimson bloom from top-center (candlelight above) */
.bg-layer::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
        radial-gradient(ellipse 90% 55% at 50% -5%,  rgba(130, 22, 45, 0.55) 0%, transparent 65%),
        radial-gradient(ellipse 70% 50% at 50% 105%, rgba(45,  10, 75, 0.50) 0%, transparent 65%),
        radial-gradient(ellipse 50% 60% at 10% 60%,  rgba(80,  15, 20, 0.18) 0%, transparent 55%),
        radial-gradient(ellipse 50% 60% at 90% 40%,  rgba(50,   8, 70, 0.18) 0%, transparent 55%);
}

/* Breathing pulse overlay */
.bg-layer::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 40% at 50% 45%, rgba(130, 22, 45, 0.12) 0%, transparent 70%);
    animation: bgPulse 6s ease-in-out infinite;
}

/* Very subtle diamond crosshatch texture */
.bg-texture {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
    background-image:
        repeating-linear-gradient(45deg,  rgba(255,255,255,0.013) 0, rgba(255,255,255,0.013) 1px, transparent 1px, transparent 9px),
        repeating-linear-gradient(-45deg, rgba(255,255,255,0.009) 0, rgba(255,255,255,0.009) 1px, transparent 1px, transparent 9px);
}

/* Hard vignette on edges */
.bg-vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
    background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 40%, rgba(0,0,0,0.70) 100%);
}

/* ──────────────────────────────────────────────
   Particle Canvas
   ────────────────────────────────────────────── */
#particle-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.85;
}

/* ──────────────────────────────────────────────
   Layout
   ────────────────────────────────────────────── */
.scene {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: min(88%, 480px);
    padding: 1.25rem 1rem 1.5rem;
    gap: 2.2rem;
    animation: sceneFadeIn 1s ease-out 0.1s both;
    margin-bottom: 24vh;
}

/* ──────────────────────────────────────────────
   Title Area
   ────────────────────────────────────────────── */
.title-area {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    user-select: none;
    animation: titleSlideDown 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
}

.title-ornament-top {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    margin-bottom: 0.5rem;
    color: var(--gold-mid);
    font-size: 0.72rem;
    letter-spacing: 0.5em;
    opacity: 0.65;
}
.title-ornament-top span { opacity: 0.5; }
.title-ornament-top::before,
.title-ornament-top::after {
    content: '';
    width: 52px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(197,160,60,0.6));
}
.title-ornament-top::after {
    background: linear-gradient(270deg, transparent, rgba(197,160,60,0.6));
}

.title-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(2.4rem, 8vw, 3.4rem);
    font-weight: 700;
    line-height: 1;
    letter-spacing: 0.18em;
    /* Gilded gradient */
    background: linear-gradient(
        180deg,
        var(--gold-hi)     0%,
        var(--gold-bright) 28%,
        var(--gold-mid)    60%,
        var(--gold-dark)   100%
    );
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: titleGlow 5s ease-in-out infinite;
}

.title-en {
    font-family: 'Cinzel', 'Georgia', serif;
    font-size: clamp(1.3rem, 4.5vw, 1.85rem);
    font-weight: 600;
    font-style: normal;
    letter-spacing: 0.28em;
    color: var(--gold-mid);
    opacity: 0.78;
    margin-top: 0.35rem;
    text-shadow: 0 0 24px rgba(197,160,60,0.45), 0 1px 3px rgba(0,0,0,0.8);
}

.title-ornament-bottom {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    margin-top: 0.6rem;
    color: var(--gold-dark);
    font-size: 0.65rem;
    opacity: 0.55;
}
.title-ornament-bottom::before,
.title-ornament-bottom::after {
    content: '';
    width: 38px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(125,94,18,0.7));
}
.title-ornament-bottom::after {
    background: linear-gradient(270deg, transparent, rgba(125,94,18,0.7));
}

/* ──────────────────────────────────────────────
   Glass Panel
   ────────────────────────────────────────────── */
.glass-panel {
    position: relative;
    width: 100%;
    background: var(--panel-bg);
    backdrop-filter: blur(18px) saturate(1.5) brightness(0.95);
    -webkit-backdrop-filter: blur(18px) saturate(1.5) brightness(0.95);
    border: 1px solid rgba(197, 160, 60, 0.42);
    border-radius: var(--panel-r);
    padding: 2rem 6rem 2.9rem;
    /* Top highlight edge (light catching the glass rim) */
    box-shadow:
        0 1px 0   rgba(255, 245, 180, 0.14) inset,
        0 0 0 1px rgba(197, 160, 60, 0.06)  inset,
        0 28px 70px rgba(0,   0,   0,   0.75),
        0  0px 90px rgba(100, 22, 40,  0.18);
    animation: panelRise 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
}

/* Corner gems */
.glass-panel::before { content: '◈'; position: absolute; top: 9px;  left:  11px;  color: var(--gold-mid); font-size: 0.6rem; opacity: 0.55; line-height: 1; }
.glass-panel::after  { content: '◈'; position: absolute; top: 9px;  right: 11px;  color: var(--gold-mid); font-size: 0.6rem; opacity: 0.55; line-height: 1; }
.corner-bl { position: absolute; bottom: 10px; left:  11px; color: var(--gold-mid); font-size: 0.6rem; opacity: 0.55; line-height: 1; pointer-events: none; user-select: none; }
.corner-br { position: absolute; bottom: 10px; right: 11px; color: var(--gold-mid); font-size: 0.6rem; opacity: 0.55; line-height: 1; pointer-events: none; user-select: none; }

/* Fine inner border inset */
.panel-inner-border {
    position: absolute;
    inset: 5px;
    border: 1px solid rgba(197, 160, 60, 0.1);
    border-radius: calc(var(--panel-r) - 2px);
    pointer-events: none;
}

/* ──────────────────────────────────────────────
   Panel Heading & Divider
   ────────────────────────────────────────────── */
.panel-title {
    text-align: center;
    margin-bottom: 1.3rem;
}

.panel-title h2 {
    font-family: 'Cinzel', 'Georgia', serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--gold-mid);
    opacity: 0.72;
}

.panel-divider {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.5rem;
    color: var(--gold-dark);
    font-size: 0.78rem;
    opacity: 0.6;
}
.panel-divider::before,
.panel-divider::after {
    content: '';
    flex: 1;
    height: 1px;
}
.panel-divider::before { background: linear-gradient(90deg,  transparent, rgba(197,160,60,0.55)); }
.panel-divider::after  { background: linear-gradient(270deg, transparent, rgba(197,160,60,0.55)); }

/* ──────────────────────────────────────────────
   Buttons
   ────────────────────────────────────────────── */
.menu-buttons {
    display: flex;
    flex-direction: column;
    gap: 0.78rem;
}

.menu-btn {
    position: relative;
    overflow: hidden;
    width: 100%;
    padding: 0.88rem 1.5rem;
    font-family: 'Noto Serif TC', 'Georgia', serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    color: #e8d9b0;
    cursor: pointer;
    border-radius: 3px;
    border: 1px solid rgba(197, 160, 60, 0.32);
    background: linear-gradient(
        180deg,
        rgba(50, 16, 30, 0.68) 0%,
        rgba(16,  6, 18, 0.88) 100%
    );
    transition:
        transform   0.22s cubic-bezier(0.2, 0.8, 0.3, 1),
        box-shadow  0.22s ease,
        border-color 0.22s ease,
        color        0.22s ease,
        background   0.22s ease;
}

/* Shimmer ribbon */
.menu-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
        105deg,
        transparent 20%,
        var(--shimmer) 48%,
        transparent 78%
    );
    transform: translateX(-110%) skewX(-8deg);
    transition: transform 0s;
    pointer-events: none;
}

/* Top highlight edge */
.menu-btn::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 10%, rgba(255,245,180,0.18) 50%, transparent 90%);
    border-radius: 3px 3px 0 0;
    pointer-events: none;
}

.menu-btn:hover {
    transform: translateY(-2px) scale(1.012);
    border-color: rgba(245, 208, 122, 0.72);
    color: var(--gold-bright);
    background: linear-gradient(
        180deg,
        rgba(80, 24, 45, 0.80) 0%,
        rgba(35, 10, 28, 0.92) 100%
    );
    box-shadow:
        0 5px 22px rgba(197, 160, 60, 0.22),
        0 0  10px rgba(197, 160, 60, 0.08) inset;
}

/* Trigger shimmer on hover */
.menu-btn:hover::before {
    transform: translateX(110%) skewX(-8deg);
    transition: transform 0.55s ease;
}

.menu-btn:active {
    transform: translateY(0) scale(0.99);
    box-shadow: none;
    transition-duration: 0.08s;
}

/* Primary CTA */
.menu-btn.primary {
    background: linear-gradient(
        180deg,
        rgba(155, 25, 52, 0.80) 0%,
        rgba( 90, 10, 28, 0.92) 100%
    );
    border-color: rgba(245, 208, 122, 0.52);
    color: #f0e4c0;
    box-shadow: 0 0 20px rgba(155, 25, 52, 0.15);
}

.menu-btn.primary:hover {
    background: linear-gradient(
        180deg,
        rgba(195, 35, 68, 0.90) 0%,
        rgba(120, 16, 38, 0.96) 100%
    );
    border-color: rgba(255, 225, 130, 0.80);
    color: #fff3d0;
    box-shadow:
        0 5px 28px rgba(195, 40, 70, 0.40),
        0 0  12px rgba(255, 200, 120, 0.10) inset;
}

/* ──────────────────────────────────────────────
   Keyframe Animations
   ────────────────────────────────────────────── */
@keyframes bgPulse {
    0%, 100% { opacity: 0.7; }
    50%       { opacity: 1.0; }
}

@keyframes titleGlow {
    0%, 100% {
        filter: drop-shadow(0 2px 8px rgba(197,160,60,0.30))
                drop-shadow(0 0 2px rgba(0,0,0,0.9));
    }
    50% {
        filter: drop-shadow(0 2px 22px rgba(245,208,122,0.72))
                drop-shadow(0 0 50px rgba(197,160,60,0.28))
                drop-shadow(0 0  3px rgba(0,0,0,0.9));
    }
}

@keyframes sceneFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
}

@keyframes titleSlideDown {
    from { opacity: 0; transform: translateY(-22px); }
    to   { opacity: 1; transform: translateY(0); }
}

@keyframes panelRise {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ──────────────────────────────────────────────
   Responsive
   ────────────────────────────────────────────── */
@media (max-width: 480px) {
    .scene { gap: 1.6rem; padding: 1rem 0.75rem; width: min(72%, 330px); }
    .glass-panel { padding: 1.5rem 3rem 1.4rem; }
    .menu-btn { padding: 0.82rem 1.2rem; font-size: 0.95rem; }
    .title-zh { letter-spacing: 0.12em; }
}

@media (max-height: 640px) {
    .scene { gap: 1.2rem; }
    .title-zh { font-size: clamp(1.9rem, 7vw, 2.6rem); }
    .glass-panel { padding: 1.4rem 2rem 1.4rem; }
    .panel-title { margin-bottom: 0.9rem; }
    .panel-divider { margin-bottom: 1.1rem; }
    .menu-buttons { gap: 0.6rem; }
}
</style>
</head>
<body>

<!-- Background decoration layers -->
<div class="bg-layer" aria-hidden="true"></div>
<div class="bg-texture" aria-hidden="true"></div>
<div class="bg-vignette" aria-hidden="true"></div>

<!-- Particle canvas -->
<canvas id="particle-canvas" aria-hidden="true"></canvas>

<!-- ── Main scene ── -->
<div class="scene">

    <!-- Title -->
    <div class="title-area">
        <div class="title-ornament-top"><span>✦</span></div>
        <h1 class="title-zh">情書</h1>
        <p  class="title-en">Love&thinsp;Letter</p>
        <div class="title-ornament-bottom">❦</div>
    </div>

    <!-- Menu panel -->
    <div class="glass-panel" role="navigation" aria-label="主選單">
        <!-- Corner gems (JS adds the bottom pair) -->
        <span class="corner-bl" aria-hidden="true">◈</span>
        <span class="corner-br" aria-hidden="true">◈</span>
        <div class="panel-inner-border" aria-hidden="true"></div>

        <div class="panel-title">
            <h2>主&ensp;選&ensp;單</h2>
        </div>

        <div class="panel-divider" aria-hidden="true">❧</div>

        <div class="menu-buttons">
            <button class="menu-btn primary" id="start-btn">開始遊戲</button>
            <button class="menu-btn"          id="rules-btn">遊戲說明</button>
            <button class="menu-btn"          id="lang-btn" >切換語言</button>
        </div>
    </div>

</div><!-- /scene -->

<script>
/* ──────────────────────────────────────────────
   Particle System
   Floating golden motes: hearts, dots, tiny ✦
   ────────────────────────────────────────────── */
(function () {
    const canvas = document.getElementById('particle-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H;

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    /* Palette */
    const COLORS  = ['#c9a227', '#f5d07a', '#e8c07a', '#b08820'];
    const SYMBOLS = ['♥', '✦', '✉', '❧', '·', '·', '·']; // weighted toward plain dots

    class Mote {
        constructor(scatter) {
            this.reset(scatter);
        }

        reset(scatter = false) {
            this.x    = Math.random() * W;
            this.y    = scatter ? Math.random() * H : H + 15;
            this.vx   = (Math.random() - 0.5) * 0.30;
            this.vy   = -(Math.random() * 0.40 + 0.12);
            this.sym  = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
            this.size = this.sym === '·' ? (Math.random() * 2 + 1.2)
                      : (Math.random() * 6 + 4);
            this.col  = COLORS[Math.floor(Math.random() * COLORS.length)];
            this.peak = Math.random() * 0.25 + 0.05;   // max alpha
            this.life = scatter ? Math.random() * 300 : 0;
            this.span = Math.random() * 260 + 180;
            this.wobF = Math.random() * Math.PI * 2;    // wobble phase
            this.wobS = (Math.random() - 0.5) * 0.022; // wobble speed
            this.alpha = 0;
        }

        step() {
            this.life++;
            this.wobF += this.wobS;
            this.x    += this.vx + Math.sin(this.wobF) * 0.28;
            this.y    += this.vy;

            const t = this.life / this.span;
            if      (t < 0.12) this.alpha = (t / 0.12) * this.peak;
            else if (t > 0.78) this.alpha = ((1 - t) / 0.22) * this.peak;
            else               this.alpha = this.peak;

            if (this.life >= this.span || this.y < -20) this.reset(false);
        }

        draw() {
            if (this.sym === '·') {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
                ctx.fillStyle = this.col;
                ctx.globalAlpha = this.alpha;
                ctx.fill();
            } else {
                ctx.font = `${this.size}px serif`;
                ctx.fillStyle = this.col;
                ctx.globalAlpha = this.alpha;
                ctx.textAlign    = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.sym, this.x, this.y);
            }
        }
    }

    /* Create particles; scatter initial batch across the canvas */
    const COUNT = Math.min(50, Math.floor(W * H / 18000));
    const motes = Array.from({ length: COUNT }, (_, i) => new Mote(i < COUNT * 0.7));

    function loop() {
        ctx.clearRect(0, 0, W, H);
        for (const m of motes) { m.step(); m.draw(); }
        ctx.globalAlpha = 1;
        requestAnimationFrame(loop);
    }
    loop();
})();

/* ──────────────────────────────────────────────
   Demo button interactions (preview only)
   ────────────────────────────────────────────── */
document.querySelectorAll('.menu-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        btn.style.transition = 'transform 0.08s ease';
        btn.style.transform  = 'scale(0.97)';
        setTimeout(() => { btn.style.transform = ''; }, 150);
    });
});
</script>
</body>
</html>
